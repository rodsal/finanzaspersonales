services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: finanzas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finanzas_personales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: finanzas-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finanzas_personales
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      FLASK_ENV: ${FLASK_ENV:-production}
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: gunicorn -w 4 -b 0.0.0.0:8000 "app.main:create_app()"

  # Frontend React (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: finanzas-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm start

volumes:
  postgres_data:
  frontend_node_modules:
